---
name: CI Pipeline

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-and-tests:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "latest"

      - name: Install dependencies
        run: make install-dev

      - name: Run Quality Gates (Linters, SAST, Tests)
        run: make quality

  security-scan:
    name: Container & Infrastructure Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Security Scan
        run: make trivy-scan
